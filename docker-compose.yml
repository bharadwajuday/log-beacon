services:
  # NATS Server with JetStream enabled
  nats:
    image: nats:2.10.14-alpine
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    command: "-js -sd /data/jetstream"
    volumes:
      - ${HOME}/log-beacon-data/nats-data:/data/jetstream
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ${HOME}/log-beacon-data/minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Handler Service
  api:
    build: .
    command: ["/bin/api"]
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hot-storage:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - HOT_STORAGE_URL=http://hot-storage:8081
      - DB_URL=postgres://logbeacon:logbeacon@postgres:5432/logbeacon_auth?sslmode=disable

  # Archiver Service (Cold Storage)
  archiver:
    build: .
    command: ["/bin/archiver"]
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY_ID=minioadmin
      - MINIO_SECRET_ACCESS_KEY=minioadmin

  # Hot Storage Consumer Service
  hot-storage:
    build: .
    command: ["/bin/hot-storage"]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
    ports:
      - "8081:8081"
    volumes:
      - ${HOME}/log-beacon-data/hot-storage-data:/data

  # Postgres Database for User Authentication
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=logbeacon
      - POSTGRES_PASSWORD=logbeacon
      - POSTGRES_DB=logbeacon_auth
    volumes:
      - ${HOME}/log-beacon-data/postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logbeacon -d logbeacon_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontendv2:
    build: ./frontendv2
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started


